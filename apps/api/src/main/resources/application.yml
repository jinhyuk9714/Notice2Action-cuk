server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: campus-action-inbox-api
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/campus_action_inbox}
    username: ${DATABASE_USERNAME:campus}
    password: ${DATABASE_PASSWORD:campus}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 12MB
  flyway:
    enabled: true
    locations: classpath:db/migration
  threads:
    virtual:
      enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health,info

app:
  extraction:
    timezone: Asia/Seoul
  notice-feed:
    enabled: true
    list-url: https://www.catholic.ac.kr/ko/campuslife/notice.do?mode=list&srCategoryId=&srSearchKey=&srSearchVal=
    fixed-delay: 3600000
    max-pages-per-run: 3
    bootstrap-on-startup: true
  ocr:
    tessdata-path: ${TESSDATA_PATH:/opt/homebrew/share/tessdata}
    languages: kor+eng
