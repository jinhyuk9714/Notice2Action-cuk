version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: campus-action-inbox-db
    environment:
      POSTGRES_DB: campus_action_inbox
      POSTGRES_USER: campus
      POSTGRES_PASSWORD: campus
      TZ: Asia/Seoul
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U campus -d campus_action_inbox"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - campus-action-inbox-db:/var/lib/postgresql/data

volumes:
  campus-action-inbox-db:
